per_listener_settings true

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config-live/passwordfile
acl_file /mosquitto/config-live/aclfile
persistence true
persistence_location /mosquitto/data/
autosave_interval 30

# 平台使用租户级 MQTT 凭证：
# - username = tenant_id
# - password = HMAC(MQTT_TENANT_PASSWORD_SECRET, tenant_id)
# passwordfile / aclfile 由 backend/scripts/render_mosquitto_auth.py 生成。
